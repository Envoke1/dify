services:
  init-permissions:
    image: busybox:latest
    command: >
      sh -c "mkdir -p /app/api/storage && chown -R 1001:1001 /app/api/storage"
    volumes:
      - dify-storage:/app/api/storage
    restart: 'no'

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-dify}
    volumes:
      - dify-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - dify-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.19.0
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_API_USER:-dify}
    volumes:
      - dify-weaviate:/var/lib/weaviate

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - dify-minio:/data

  ssrf-proxy:
    image: ubuntu/squid:latest
    restart: always

  sandbox:
    image: langgenius/dify-sandbox:0.2.10
    restart: always
    environment:
      API_KEY: ${SANDBOX_API_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15

  plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.6.1-local
    restart: always
    environment:
      SERVER_PORT: 5002
      SERVER_KEY: ${PLUGIN_DAEMON_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_STORAGE_TYPE: local
      PLUGIN_STORAGE_LOCAL_ROOT: /app/storage
      FORCE_VERIFYING_SIGNATURE: 'true'
      MAX_PLUGIN_PACKAGE_SIZE: '52428800'
      PYTHON_ENV_INIT_TIMEOUT: '120'
      PLUGIN_MAX_EXECUTION_TIMEOUT: '600'
    volumes:
      - dify-plugin-packages:/app/storage/plugin_packages
      - dify-plugin-cwd:/app/storage/cwd
    depends_on:
      - db
      - redis

  api:
    image: langgenius/dify-api:1.13.3
    restart: always
    environment:
      MODE: api
      MIGRATION_ENABLED: 'true'
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      VECTOR_STORE: weaviate
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY}
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: dify
      S3_REGION: us-east-1
      APP_WEB_URL: ${APP_WEB_URL}
      CONSOLE_API_URL: ${CONSOLE_API_URL}
      CONSOLE_WEB_URL: ${CONSOLE_WEB_URL}
      APP_API_URL: ${APP_API_URL}
      SERVICE_API_URL: ${SERVICE_API_URL}
      INTERNAL_FILES_URL: http://api:5001
      SECRET_KEY: ${SECRET_KEY}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      SANDBOX_HOST: sandbox
      SANDBOX_PORT: 8194
      SANDBOX_API_KEY: ${SANDBOX_API_KEY}
      PLUGIN_DAEMON_HOST: plugin-daemon
      PLUGIN_DAEMON_PORT: 5002
      PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
      PLUGIN_DAEMON_URL: http://plugin-daemon:5002
      PLUGIN_DAEMON_API_URL: http://plugin-daemon:5002
      PLUGIN_REMOTE_INSTALL_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALL_PORT: 5003
      SSRF_PROXY_HTTP_URL: http://ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf-proxy:3128
      CONSOLE_CORS_ALLOW_ORIGINS: ${CONSOLE_CORS_ALLOW_ORIGINS:-*}
      WEB_API_CORS_ALLOW_ORIGINS: ${WEB_API_CORS_ALLOW_ORIGINS:-*}
      CODE_EXECUTION_ENDPOINT: http://sandbox:8194
      CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY}
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      - init-permissions
      - db
      - redis
      - weaviate
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

  worker:
    image: langgenius/dify-api:1.13.3
    restart: always
    environment:
      MODE: worker
      MIGRATION_ENABLED: 'false'
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-dify}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      VECTOR_STORE: weaviate
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      WEAVIATE_ENDPOINT: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY}
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: dify
      S3_REGION: us-east-1
      SECRET_KEY: ${SECRET_KEY}
      PLUGIN_DAEMON_HOST: plugin-daemon
      PLUGIN_DAEMON_PORT: 5002
      PLUGIN_DAEMON_KEY: ${PLUGIN_DAEMON_KEY}
      PLUGIN_DAEMON_URL: http://plugin-daemon:5002
      SSRF_PROXY_HTTP_URL: http://ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://ssrf-proxy:3128
    volumes:
      - dify-storage:/app/api/storage
    depends_on:
      - db
      - redis
      - minio

  web:
    image: langgenius/dify-web:1.13.3
    restart: always
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL}
      APP_API_URL: ${APP_API_URL}
      BACKEND_URL: http://api:5001
      NEXT_PUBLIC_SITE_DOMAIN: ${WEB_DOMAIN}
      NEXT_PUBLIC_API_PREFIX: ${CONSOLE_API_URL}/v1
      NEXT_PUBLIC_PUBLIC_API_PREFIX: ${CONSOLE_API_URL}/v1
      NEXT_PUBLIC_COOKIE_DOMAIN: ${COOKIE_DOMAIN}

  nginx:
    image: nginx:alpine
    restart: always
    command: >
      sh -c "
      cat > /etc/nginx/nginx.conf <<'EOF'
      events { worker_connections 1024; }
      http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        upstream api_server { server api:5001; }
        upstream web_server { server web:3000; }
        server {
          listen 80;
          server_name _;
          client_max_body_size 500M;
          location / {
            proxy_pass http://web_server;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /console {
            proxy_pass http://api_server;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /api {
            proxy_pass http://api_server;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /v1 {
            proxy_pass http://api_server;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
          location /files {
            proxy_pass http://api_server;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
          }
          location /health {
            proxy_pass http://api_server;
            access_log off;
          }
        }
      }
      EOF
      nginx -g 'daemon off;'
      "
    depends_on:
      - api
      - web
    labels:
      - coolify.enable=true
      - 'traefik.http.routers.dify.rule=Host(`dify.amanigroupdigital.co.za`)'
      - traefik.http.services.dify.loadbalancer.server.port=80
      - coolify.port=80

volumes:
  dify-db:
  dify-redis:
  dify-weaviate:
  dify-storage:
  dify-plugin-packages:
  dify-plugin-cwd:
  dify-minio:
